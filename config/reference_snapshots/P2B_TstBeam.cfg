# System
 Sys Name EicP2Bt

 Sys NbOfSamples 16

# Actions
 Sys Action PedThrRun 0
 Sys Action TrgThrRun 0
 Sys Action DataRun   1
#Sys Action SetParams 0

# DAQ Run
 Sys DaqRun Rate      Low # High - max rate; Med - o(100); Low - o(10) Hz
 Sys DaqRun Trig      Ext # Cst, Exp, Slf, Ext
 Sys DaqRun Mode      ZS # Raw, Ped, CMN, ZS
 Sys DaqRun Events    0 # 0 - Infinite
 Sys DaqRun Time      0 # Sec; 0 - Infinite
 Sys DaqRun EndType   Stop # Stop or Restart
 Sys DaqRun Prescale  1 # 0 - no data - all prescaled
 Sys DaqRun FileSize  1000 # 0 - no restriction (MB)

# Ped Run
 Sys PedRun Rate      Med # High - max rate; Med - o(100); Low - o(10) Hz
 Sys PedRun Trig      Cst # Cst, Exp - Poisson
Sys PedRun Events    500 # Number of events for pedestal runs
Sys PedRun Threshold  5.00 # Threshold in sigmas

# Trigger
 Sys Trg MultMoreThan 2
 Sys Trg MultLessThan 4

# Topology : Feu ID [1 n] indicates TCM input
#            Dream ID [0-7] : Msk; Dat; Trg
# nb_of_topo_feus= 4 topo_feu_min= 1 topo_feu_max= 5
# nb_of_active_feus= 4 active_feus=0x0000003a
# nb_of_trig_feus=0      trig_feus=0x00000000
Sys Topo Feu  1 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat # mode=Dat dreams: act=8 0x000000ff
Sys Topo Feu  3 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat # mode=Dat dreams: act=8 0x000000ff
Sys Topo Feu  4 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat # mode=Dat dreams: act=8 0x000000ff
Sys Topo Feu  5 Dream      0 Dat      1 Dat      2 Dat      3 Dat      4 Dat      5 Dat      6 Dat      7 Dat # mode=Dat dreams: act=8 0x000000ff

# Tcm
# tcm_feu_mask=0x00ffffc5 tcm_trg_mask=0x00ffffff
Tcm UdpPort 16000
Tcm SelEdge 1

